[build]
  base = "motskin02-pwa"
  command = "npm install && npm run build"
  publish = "build"
  functions = "functions"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "node_modules,build/static/js"

# Dimanche 09:00 heure Israël = 07:00 UTC
[[scheduled_functions]]
  name = "notify-dimanche"
  cron = "0 7 * * 0"

# Vendredi 15:00 heure Israël = 13:00 UTC
[[scheduled_functions]]
  name = "notify-vendredi"
  cron = "0 13 * * 5"
